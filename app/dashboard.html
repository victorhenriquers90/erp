<script id="laviapp-free-limits-safe">
(function(){
  if(window.__laviappFreeLimitsSafe) return;
  window.__laviappFreeLimitsSafe = true;

  const LIMITES = { membros:2, lancamentosMes:30, pdf:false };

  function planoAtual(){
    try{
      if(location.search.toLowerCase().includes("plano=free")) return "free";
      return String(
        localStorage.getItem("laviapp-plano") ||
        localStorage.getItem("laviapp-plano-selecionado") ||
        localStorage.getItem("plano") ||
        ""
      ).toLowerCase();
    }catch(e){ return ""; }
  }

  function isFree(){ return planoAtual() === "free"; }

  function ativarFree(){
    try{
      localStorage.setItem("laviapp-plano","free");
      localStorage.setItem("laviapp-plano-selecionado","free");
      localStorage.setItem("laviapp-plano-free-ativo","1");
      localStorage.setItem("laviapp-plano-free-inicio", new Date().toISOString());
    }catch(e){}
    alert("Plano Free ativado! Limites: até 2 membros, 30 lançamentos por mês e sem relatório PDF.");
  }

  function mesKey(){
    const d = new Date();
    return "laviapp-free-lancamentos-" + d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
  }

  function getLancamentos(){
    try{return Number(localStorage.getItem(mesKey()) || "0");}catch(e){return 0;}
  }

  function incLancamentos(){
    try{localStorage.setItem(mesKey(), String(getLancamentos()+1));}catch(e){}
  }

  function bloquear(msg){ alert(msg); return false; }

  window.laviappFreeLimits = {
    isFree,
    ativarFree,
    podeAdicionarMembro:function(totalAtual){
      if(!isFree()) return true;
      if(Number(totalAtual||0) >= LIMITES.membros){
        return bloquear("Plano Free: limite de até 2 membros. Para adicionar mais pessoas, escolha um plano pago.");
      }
      return true;
    },
    podeAdicionarLancamento:function(){
      if(!isFree()) return true;
      if(getLancamentos() >= LIMITES.lancamentosMes){
        return bloquear("Plano Free: limite de 30 lançamentos por mês atingido. Para continuar, escolha um plano pago.");
      }
      incLancamentos();
      return true;
    },
    podeExportarPDF:function(){
      if(!isFree()) return true;
      return bloquear("Relatório PDF não está disponível no Plano Free. Escolha um plano pago para liberar PDF.");
    }
  };

  function norm(t){
    return String(t||"").normalize("NFD").replace(/[\\u0300-\\u036f]/g,"").toLowerCase();
  }

  function ligar(){
    document.querySelectorAll("button,a").forEach(function(el){
      if(el.dataset.laviFreeSafeWired) return;

      const all = norm(
        (el.textContent||"") + " " +
        (el.getAttribute("href")||"") + " " +
        (el.getAttribute("data-plano")||"") + " " +
        (el.getAttribute("data-plan")||"") + " " +
        (el.getAttribute("aria-label")||"") + " " +
        (el.getAttribute("title")||"")
      );

      if(all.includes("free") || all.includes("teste gratis") || all.includes("comecar gratis")){
        el.dataset.laviFreeSafeWired = "1";
        el.addEventListener("click", function(ev){
          ev.preventDefault();
          ev.stopPropagation();
          ativarFree();
        }, true);
        return;
      }

      if(all.includes("pdf") || all.includes("exportar")){
        el.dataset.laviFreeSafeWired = "1";
        el.addEventListener("click", function(ev){
          if(!window.laviappFreeLimits.podeExportarPDF()){
            ev.preventDefault(); ev.stopPropagation();
          }
        }, true);
      }
    });
  }

  if(location.search.toLowerCase().includes("plano=free")) {
    try{ localStorage.setItem("laviapp-plano","free"); localStorage.setItem("laviapp-plano-selecionado","free"); }catch(e){}
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", function(){ ligar(); setTimeout(ligar,1200); }, {once:true});
  }else{
    ligar(); setTimeout(ligar,1200);
  }
})();
</script>

<script id="laviapp-free-open-signup">
(function(){
  if(window.__laviappFreeOpenSignup) return;
  window.__laviappFreeOpenSignup = true;

  function hasFreeSignupIntent(){
    const qs = location.search.toLowerCase();
    try{
      return qs.includes("plano=free") && (qs.includes("cadastro=1") || qs.includes("criarfamilia=1") || localStorage.getItem("laviapp-free-criar-familia") === "1");
    }catch(e){
      return qs.includes("plano=free") && (qs.includes("cadastro=1") || qs.includes("criarfamilia=1"));
    }
  }

  function saveFree(){
    try{
      localStorage.setItem("laviapp-plano","free");
      localStorage.setItem("laviapp-plano-selecionado","free");
      localStorage.setItem("laviapp-plano-free-ativo","1");
      localStorage.setItem("laviapp-free-criar-familia","1");
      localStorage.setItem("laviapp-plano-free-inicio", localStorage.getItem("laviapp-plano-free-inicio") || new Date().toISOString());
    }catch(e){}
  }

  function norm(t){
    return String(t||"").normalize("NFD").replace(/[\\u0300-\\u036f]/g,"").toLowerCase();
  }

  function clickCreateAccount(){
    if(!hasFreeSignupIntent()) return false;

    saveFree();

    const candidates = Array.from(document.querySelectorAll("button,a,span,div"))
      .filter(el => {
        const t = norm(el.textContent);
        if(!t) return false;
        return (
          t.includes("criar conta") ||
          t.includes("cadastre") ||
          t.includes("cadastrar") ||
          t.includes("nova conta") ||
          t.includes("registrar")
        );
      });

    for(const el of candidates){
      const rect = el.getBoundingClientRect();
      if(rect.width > 0 && rect.height > 0){
        el.click();
        return true;
      }
    }

    return false;
  }

  function markFreeSignup(){
    if(!hasFreeSignupIntent()) return;

    saveFree();

    // Coloca um aviso discreto acima da tela, sem loop.
    if(!document.getElementById("laviapp-free-signup-banner")){
      const b = document.createElement("div");
      b.id = "laviapp-free-signup-banner";
      b.textContent = "Cadastro Free: crie sua conta para iniciar sua família gratuita.";
      b.style.cssText = "position:fixed;left:12px;right:12px;top:12px;z-index:9999;background:#10243C;color:#E2E8F0;border:1px solid rgba(45,212,191,.35);border-radius:14px;padding:10px 12px;text-align:center;font:600 12px Inter,system-ui,sans-serif;box-shadow:0 14px 34px rgba(0,0,0,.25)";
      document.body.appendChild(b);
      setTimeout(function(){ b.remove(); }, 4200);
    }
  }

  function run(){
    if(!hasFreeSignupIntent()) return;

    markFreeSignup();

    // Tenta abrir o cadastro logo após React renderizar.
    setTimeout(clickCreateAccount, 300);
    setTimeout(clickCreateAccount, 900);
    setTimeout(clickCreateAccount, 1800);
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run, {once:true});
  }else{
    run();
  }
})();
</script>
</body>
</html>
