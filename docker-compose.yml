# PHASE 12: Docker Compose for local development and testing
# Start all services: docker-compose up
# Run tests: docker-compose run tests
# Stop all services: docker-compose down

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projetovarejo-api
    ports:
      - "127.0.0.1:5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=sqlserver;Database=ProjetoVarejo;User Id=sa;Password=${MSSQL_SA_PASSWORD:-AdminPassword123!};TrustServerCertificate=True;Encrypt=False
      - Jwt__SecretKey=${JWT_SECRET_KEY:-sua-chave-secreta-256-bits-minimo-32-caracteres-nao-esqueca}
      - Redis__Connection=redis:6379
      - Redis__Enabled=true
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    depends_on:
      sqlserver:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./logs:/app/logs
    networks:
      - projetovarejo-network
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: projetovarejo-sqlserver
    ports:
      - "127.0.0.1:1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD:-AdminPassword123!}
      - MSSQL_PID=Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD:-AdminPassword123!}", "-Q", "SELECT 1", "-C", "-No"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - projetovarejo-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: projetovarejo-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - projetovarejo-network
    restart: unless-stopped

  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    container_name: projetovarejo-tests
    environment:
      - ConnectionStrings__Default=Server=sqlserver;Database=ProjetoVarejo_Tests;User Id=sa;Password=${MSSQL_SA_PASSWORD:-AdminPassword123!};TrustServerCertificate=True;Encrypt=False
    depends_on:
      sqlserver:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./test-results:/app/TestResults
      - ./coverage:/app/coverage
    networks:
      - projetovarejo-network
    command: dotnet test tests/ProjetoVarejo.Tests/ProjetoVarejo.Tests.csproj -c Release --logger:trx --collect:"XPlat Code Coverage" --results-directory /app/TestResults

volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local

networks:
  projetovarejo-network:
    driver: bridge
