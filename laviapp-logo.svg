  </g>
  <text x="78" y="34" fill="#f5f0e8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="0">LaviApp</text>
  <text x="79" y="53" fill="#b9b2a6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="0">Gestao financeira familiar</text>
