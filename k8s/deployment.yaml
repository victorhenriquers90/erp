apiVersion: apps/v1
kind: Deployment
metadata:
  name: projetovarejo-api
  namespace: default
  labels:
    app: projetovarejo-api
    version: v1

spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: projetovarejo-api

  template:
    metadata:
      labels:
        app: projetovarejo-api
        version: v1

    spec:
      serviceAccountName: projetovarejo-api

      # Security context for pods
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: api
          image: ghcr.io/your-org/projeto-varejo/api:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # Environment variables from ConfigMap and Secrets
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"

            - name: ASPNETCORE_URLS
              value: "http://+:80"

            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: projetovarejo-secrets
                  key: database-connection-string

            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: projetovarejo-secrets
                  key: jwt-secret-key

            - name: Redis__Connection
              valueFrom:
                configMapKeyRef:
                  name: projetovarejo-config
                  key: redis-connection

            - name: Redis__Enabled
              value: "true"

            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: projetovarejo-secrets
                  key: appinsights-connection-string
                  optional: true

            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: projetovarejo-config
                  key: log-level

          # Resource requests and limits
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Liveness probe (is the container still running?)
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness probe (can it handle traffic?)
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup probe (did it start successfully?)
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          # Volume mounts for logs
          volumeMounts:
            - name: logs
              mountPath: /app/logs

      # Volumes
      volumes:
        - name: logs
          emptyDir: {}

      # Affinity rules for pod distribution
      affinity:
        # Prefer spreading pods across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - projetovarejo-api
                topologyKey: kubernetes.io/hostname

      # Image pull secrets for private registries
      imagePullSecrets:
        - name: ghcr-secret

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: projetovarejo-api
  namespace: default
