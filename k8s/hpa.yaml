apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: projetovarejo-api-hpa
  namespace: default

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: projetovarejo-api

  minReplicas: 2  # Minimum for high availability
  maxReplicas: 10 # Cost control upper limit

  metrics:
    # Scale based on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale up if CPU > 70%

    # Scale based on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale up if memory > 80%

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50  # Remove 50% of pods
          periodSeconds: 15

    scaleUp:
      stabilizationWindowSeconds: 30  # Fast scale up
      policies:
        - type: Percent
          value: 100  # Double the pods
          periodSeconds: 15
        - type: Pods
          value: 2  # Or add 2 pods
          periodSeconds: 15
      selectPolicy: Max  # Use whichever scales up more

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: projetovarejo-api-pdb
  namespace: default

spec:
  minAvailable: 2  # Always keep at least 2 pods running
  selector:
    matchLabels:
      app: projetovarejo-api
