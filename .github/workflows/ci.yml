name: CI - Build, Test & Container

# Trigger on push to main/develop and pull requests
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # Job 1: Build and Run Tests
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Run tests with code coverage
        run: |
          dotnet test tests/ProjetoVarejo.Tests/ProjetoVarejo.Tests.csproj \
            -c Release \
            --no-build \
            --logger:trx \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

      - name: Check code coverage
        run: |
          COVERAGE=$(find TestResults -name "coverage.cobertura.xml" | head -1)
          if [ -f "$COVERAGE" ]; then
            echo "Code coverage report generated at: $COVERAGE"
            # You can parse the coverage % and fail if below threshold
          else
            echo "Warning: No coverage report found"
          fi

  # Job 2: Security Scanning
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Check for vulnerable NuGet packages
        run: |
          dotnet restore
          dotnet list package --vulnerable

      - name: Run SonarCloud analysis (optional)
        # Only run on main branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "SonarCloud analysis would run here with SONAR_TOKEN"
          # Requires additional sonar-scanner setup

  # Job 3: Build and Push Docker Image
  build-container:
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # Job 4: Notify on completion
  notify:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan, build-container]
    if: always()

    steps:
      - name: Determine workflow status
        id: status
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "success" && \
                "${{ needs.security-scan.result }}" == "success" && \
                "${{ needs.build-container.result }}" == "success" ]]; then
            echo "WORKFLOW_STATUS=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "COLOR=00FF00" >> $GITHUB_OUTPUT
          else
            echo "WORKFLOW_STATUS=❌ FAILED" >> $GITHUB_OUTPUT
            echo "COLOR=FF0000" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack (optional)
        if: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "${{ steps.status.outputs.WORKFLOW_STATUS }} - CI pipeline completed"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
