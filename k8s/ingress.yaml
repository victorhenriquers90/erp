apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: projetovarejo-api-ingress
  namespace: default
  annotations:
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"  # 100 requests per second
    nginx.ingress.kubernetes.io/limit-rps: "50"    # 50 connections per second
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  ingressClassName: nginx

  rules:
    # API domain
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: projetovarejo-api
                port:
                  name: http

    # Staging API domain
    - host: staging-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: projetovarejo-api-staging
                port:
                  name: http

  # TLS configuration with Let's Encrypt
  tls:
    - hosts:
        - api.example.com
      secretName: projetovarejo-api-tls

    - hosts:
        - staging-api.example.com
      secretName: projetovarejo-api-staging-tls

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod

spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod

    solvers:
      - http01:
          ingress:
            class: nginx

---
# Network Policy to restrict traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: projetovarejo-api-network-policy
  namespace: default

spec:
  podSelector:
    matchLabels:
      app: projetovarejo-api

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow from Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80

    # Allow from health check probes
    - ports:
        - protocol: TCP
          port: 80

  egress:
    # Allow to database service
    - to:
        - podSelector:
            matchLabels:
              app: sqlserver
      ports:
        - protocol: TCP
          port: 1433

    # Allow to Redis service
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

    # Allow DNS lookups
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

    # Allow external HTTPS (for Application Insights, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
