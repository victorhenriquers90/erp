<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1080" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">LaviApp</title>
  <desc id="desc">Logo oficial do LaviApp com icone, nome e slogan Financas Familiar.</desc>
  <defs>
    <linearGradient id="laviBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B7BFF"/>
      <stop offset="48%" stop-color="#1E50F0"/>
      <stop offset="100%" stop-color="#0A2680"/>
    </linearGradient>
    <linearGradient id="laviGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="laviShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="laviTeal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B894"/>
      <stop offset="55%" stop-color="#00E5C4"/>
      <stop offset="100%" stop-color="#5CFFE5"/>
    </linearGradient>
    <linearGradient id="laviWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F0FF"/>
    </linearGradient>
    <radialGradient id="laviHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5CFFE5" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#5CFFE5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5CFFE5" stop-opacity="0"/>
    </radialGradient>
    <filter id="laviGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.3"/>
    </filter>
    <filter id="brandShadow" x="-12%" y="-18%" width="132%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <g filter="url(#brandShadow)">
    <g transform="translate(128 116) scale(3.8)">
      <rect width="128" height="128" rx="28" fill="url(#laviBg)"/>
      <rect width="128" height="128" rx="28" fill="url(#laviShade)"/>
      <rect width="128" height="128" rx="28" fill="url(#laviGloss)"/>
      <circle cx="108" cy="20" r="14" fill="url(#laviHalo)"/>
      <path d="M26 24 H45 V90 H86 V107 H26 Z" fill="url(#laviWhite)"/>
      <rect x="58" y="68" width="11" height="39" rx="2.5" fill="#FFFFFF" fill-opacity="0.30"/>
      <rect x="73" y="54" width="11" height="53" rx="2.5" fill="#FFFFFF" fill-opacity="0.46"/>
      <rect x="88" y="40" width="11" height="67" rx="2.5" fill="#FFFFFF" fill-opacity="0.62"/>
      <rect x="103" y="24" width="11" height="83" rx="2.5" fill="url(#laviTeal)"/>
      <polyline points="63,62 78,48 93,36 108,20" fill="none" stroke="#5CFFE5" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" filter="url(#laviGlow)"/>
      <polyline points="63,62 78,48 93,36 108,20" fill="none" stroke="url(#laviTeal)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="108" cy="20" r="4.8" fill="#0A2680"/>
      <circle cx="108" cy="20" r="3.8" fill="url(#laviTeal)"/>
      <circle cx="108" cy="20" r="1.5" fill="#FFFFFF"/>
    </g>

    <g transform="translate(690 0)">
      <text x="0" y="320" fill="#F1F5F9" font-family="'Sora','Inter','Segoe UI',Arial,sans-serif" font-size="170" font-weight="800" letter-spacing="-8">Lavi<tspan fill="#00E5C4">App</tspan></text>
      <text x="8" y="438" textLength="650" lengthAdjust="spacing" fill="#93A4B8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="38" font-weight="900" letter-spacing="8">FINAN&#199;AS FAMILIAR</text>
    </g>
  </g>
</svg>
