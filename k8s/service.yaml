apiVersion: v1
kind: Service
metadata:
  name: projetovarejo-api
  namespace: default
  labels:
    app: projetovarejo-api

spec:
  type: LoadBalancer

  selector:
    app: projetovarejo-api

  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

  # Session affinity for sticky sessions (optional)
  sessionAffinity: None

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: projetovarejo-config
  namespace: default

data:
  redis-connection: "redis-service.default.svc.cluster.local:6379"
  log-level: "Information"
  health-check-interval: "30"
  cache-duration-minutes: "60"

---
apiVersion: v1
kind: Secret
metadata:
  name: projetovarejo-secrets
  namespace: default

type: Opaque

stringData:
  # Base64 encoded in actual use
  database-connection-string: "Server=sqlserver-service.default.svc.cluster.local;Database=ProjetoVarejo;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True;"
  jwt-secret-key: "sua-chave-secreta-256-bits-minimo-32-caracteres-nao-esqueca"
  appinsights-connection-string: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: default

type: kubernetes.io/dockercfg

data:
  .dockercfg: eyJnaGNyLmlvIjp7ImF1dGgiOiJCM0J6WTI5elpTQkRSVEZS..."}}
